# ── SC Format Field Mapping ──
# Maps SC record type 20/50 field positions → unified column names
sc_field_map:
  loan_id:              [20, 1]
  amortization_type:    [20, 3]
  num_borrowers:        [20, 4]
  first_time_homebuyer: [20, 5]
  prepayment_penalty:   [20, 6]
  seller_name:          [20, 11]
  property_state:       [20, 12]
  postal_code:          [20, 13]
  msa:                  [20, 14]
  orig_date:            [20, 15]
  loan_term:            [20, 17]
  orig_interest_rate:   [20, 18]
  orig_loan_amount:     [20, 19]
  orig_upb:             [20, 20]
  occupancy_status:     [20, 21]
  channel:              [20, 22]
  property_type:        [20, 23]
  num_units:            [20, 24]
  loan_purpose:         [20, 25]
  credit_score:         [20, 29]
  ltv:                  [20, 30]
  cltv:                 [20, 31]
  dti:                  [20, 32]
  reporting_period:     [50, 2]
  servicer_name:        [50, 3]
  current_interest_rate: [50, 5]
  maturity_date:        [50, 6]
  current_deferred_upb: [50, 7]
  delinquency_status:   [50, 18]
  payment_history:      [50, 19]

# ── Sentinel Values ──
sentinels:
  credit_score:             [9999, 0]
  co_borrower_credit_score: [9999, 0]
  current_credit_score:     [9999, 0]
  co_borr_current_score:    [9999, 0]
  dti:                      [999, 0]
  ltv:                      [999, 0]
  cltv:                     [999, 9999, 0]
  mi_percent:               [999]
  orig_dti_2:               [999, 0]

# ── Derived Column Definitions ──
derived:
  dpd_map:
    "00": "Current"
    "01": "30_DPD"
    "02": "60_DPD"
    "03": "90_DPD"
    "RA": "REO_Acquired"
  dpd_numeric_gte: 4          # Codes 04+ become "120_Plus_DPD"
  dpd_default: "Other"

  credit_score_bands:
    - [0,    619, "Subprime (<620)"]
    - [620,  679, "Fair (620-679)"]
    - [680,  719, "Good (680-719)"]
    - [720,  779, "Very Good (720-779)"]
    - [780, 9999, "Excellent (780+)"]

  ltv_buckets:
    - [0,   60, "Low (<=60)"]
    - [61,  80, "Medium (61-80)"]
    - [81,  90, "High (81-90)"]
    - [91, 999, "Very High (>90)"]

  rate_buckets:
    - [0.0,   3.499, "Below 3.5%"]
    - [3.5,   4.499, "3.5% - 4.5%"]
    - [4.5,   5.499, "4.5% - 5.5%"]
    - [5.5,   6.499, "5.5% - 6.5%"]
    - [6.5, 999.0,   "6.5%+"]

# ── Validation Thresholds ──
validation:
  max_null_pct_critical:
    loan_id: 0.0
    delinquency_status: 1.0
  max_null_pct_warning:
    credit_score: 5.0
    ltv: 5.0
    current_upb: 2.0
  max_duplicate_loan_ids: 0
  expected_field_count: 90
  min_loans_per_file: 100
