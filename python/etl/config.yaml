# ─────────────────────────────────────────────────────────────────
# Mortgage Servicing Analytics Platform — Configuration
# ─────────────────────────────────────────────────────────────────
# All configurable parameters in one place.
# Edit this file to change bucket boundaries, thresholds, paths, etc.

# ── Paths ──
paths:
  input_dir: "data/raw/"
  database: "data/mortgage_analytics.duckdb"
  reports_dir: "reports/"
  log_file: "reports/etl_log.txt"
  manifest_file: "reports/etl_manifest.csv"

# ── Database ──
database:
  table_name: "loans"

# ── Column Schema ──
