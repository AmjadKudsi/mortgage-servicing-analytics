# ─────────────────────────────────────────────────────────────────
# ML Pipeline Configuration
# ─────────────────────────────────────────────────────────────────

# ── Feature Sets ──
# Model Names:
#   OriginRisk — Origination Scoring Model (uses only origination time features)
#   SegmentIQ  — Behavioral Segmentation Model (uses all features including payment history)

# Model B: origination-only (genuine predictor)
origination_features_numeric:
  - credit_score
  - ltv
  - dti
  - orig_interest_rate
  - loan_age
  - orig_loan_amount
  - num_borrowers

origination_features_categorical:
  - credit_score_band
  - ltv_bucket
  - rate_bucket
  - channel
  - property_type
  - occupancy_status
  - loan_purpose

origination_features_binary:
  - is_first_time_buyer

# Model A: behavioral (adds payment history for segmentation)
behavioral_features_extra:
  - dlq_count_12m
  - max_dpd_12m
  - consecutive_current
  - dlq_trend_6m
  - current_upb
  - latest_credit_score

target: is_delinquent

# ── Model Parameters ──
models:
  logistic_regression:
    class_weight: balanced
    max_iter: 1000
    solver: lbfgs
    random_state: 42

  random_forest:
    n_estimators: 200
    max_depth: 12
    min_samples_leaf: 50
    class_weight: balanced
    random_state: 42

# ── Safety Thresholds ──
safety:
  min_delinquency_rate: 0.001      # Abort if < 0.1%
  max_delinquency_rate: 0.50       # Abort if > 50%
  leakage_correlation_threshold: 0.95
  auc_leakage_flag: 0.99           # Flag if AUC exceeds this
  min_test_delinquent_count: 50    # Abort if test set has fewer
  max_train_time_seconds: 300

# ── Lift Analysis ──
lift_percentiles: [1, 5, 10, 20]

# ── Segment Ranking ──
min_segment_size: 30

# ── Paths ──
paths:
  feature_sql: "python/ml/feature_engineering.sql"
  output_dir: "python/ml/model_artifacts"
  log_file: "reports/ml_log.txt"
